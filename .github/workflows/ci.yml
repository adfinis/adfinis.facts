---
name: ci

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

on:
  push:
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:
  ansible-lint:
    uses: ansible/ansible-content-actions/.github/workflows/ansible_lint.yaml@7dc7e15a53c2ae8bd092461e53dafd6627e34ac6 # v1.1.0
  sanity:
    uses: ansible/ansible-content-actions/.github/workflows/sanity.yaml@7dc7e15a53c2ae8bd092461e53dafd6627e34ac6 # v1.1.0
  unit-galaxy:
    uses: ansible/ansible-content-actions/.github/workflows/unit.yaml@7dc7e15a53c2ae8bd092461e53dafd6627e34ac6 # v1.1.0
  all_green:
    if: ${{ always() }}
    needs:
      - sanity
      - unit-galaxy
      - ansible-lint
    runs-on: ubuntu-latest
    steps:
      - run: >-
          python -c "assert 'failure' not in
          set([
          '${{ needs.sanity.result }}',
          '${{ needs.unit-galaxy.result }}'
          '${{ needs.ansible-lint.result }}'
          ])"
